# GitHub Dependabot — Python + GitHub Actions
# Python deps 스캔은 backend/requirements*.txt 만. 주 1회, 월요일 09:00 KST.
# npm 스캔은 frontend 가 들어올 때 추가. GitHub Actions 자체는 자동 추적.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    # 보수적 — 메이저 업데이트는 수동으로 올린다 (FastAPI/Pydantic 호환성).
    # 마이너/패치는 자동 PR. 메이저는 그룹화만.
    groups:
      python-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      python-major:
        applies-to: version-updates
        update-types:
          - "major"
    # 보안 업데이트는 항상 즉시.
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    # 무시할 패키지 — 운영에서 직접 pin (복잡 호환 이슈)
    ignore:
      - dependency-name: "langchain*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langgraph*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
