[alembic]
#   .   repo :
#   cd backend && alembic -c controlplane/migrations/alembic.ini upgrade head
script_location = controlplane/migrations
prepend_sys_path = ../..
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = Asia/Seoul
truncate_slug_length = 40

#  CONTROL_DB_URL   load_cp_settings()  . alembic.ini 
#    (  ).
sqlalchemy.url = sqlite:///./out/control-plane.sqlite

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S